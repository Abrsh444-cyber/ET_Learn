name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and build TWA
        run: |
          bubblewrap init --manifest https://etlearn-project-kxvp.vercel.app/manifest.json --directory ./twa-build <<< $'\n\n\n\n\n\n\n\n'
          cd twa-build
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ethiolearn-apk
          path: twa-build/app-release-signed.apk
